name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches __version__
        run: |
          APP_VER=$(python -c "from _version import __version__; print(__version__)")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$APP_VER" != "$TAG_VER" ]; then
            echo "::error::_version.py says $APP_VER but tag is v$TAG_VER. Update _version.py and re-tag."
            exit 1
          fi
          echo "Version $APP_VER matches tag v$TAG_VER."
        shell: bash

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run --with pyinstaller pyinstaller --clean -y --distpath ./dist --workpath ./build SupraSimFit.spec

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/SupraSimFit.app SupraSimFit-${{ github.ref_name }}-macos.zip

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r ../SupraSimFit-${{ github.ref_name }}-linux.zip ./SupraSimFit

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path 'dist\SupraSimFit\*' -DestinationPath "SupraSimFit-${{ github.ref_name }}-windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupraSimFit-${{ matrix.os }}
          path: ./SupraSimFit-${{ github.ref_name }}-*.zip
          if-no-files-found: error

  publish_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ./artifacts/**/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
