name: Auto-tag on version bump

# When _version.py changes on main, create and push the matching vX.Y.Z tag.
# That tag in turn triggers .github/workflows/build_and_release.yml.
# If the tag already exists (e.g. _version.py was touched without bumping),
# this is a no-op.
#
# IMPORTANT: GitHub's default GITHUB_TOKEN cannot trigger downstream
# workflows by design — a tag pushed with it will NOT fire
# build_and_release.yml. To make the release chain work, this workflow
# uses a Personal Access Token (PAT) stored as the repo secret
# RELEASE_PAT. Create a fine-grained PAT with `Contents: read and write`
# on this repo and save it as RELEASE_PAT. Until that secret exists the
# checkout step below fails loudly, which is the intended behavior.

on:
  push:
    branches: [main]
    paths: ['_version.py']

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using a PAT here means subsequent `git push` carries that token,
          # so the resulting tag push is treated as a user action and *does*
          # trigger build_and_release.yml.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Create tag if version is new
        run: |
          V=$(python -c "from _version import __version__; print(__version__)")
          TAG="v$V"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed $TAG."
