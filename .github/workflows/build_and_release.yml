name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run --with pyinstaller pyinstaller --clean -y --distpath ./dist --workpath ./build FittingApp.spec

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/FittingApp.app FittingApp-${{ github.ref_name }}-macos.zip

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r ../FittingApp-${{ github.ref_name }}-linux.zip ./FittingApp

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path 'dist\FittingApp\*' -DestinationPath "FittingApp-${{ github.ref_name }}-windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FittingApp-${{ matrix.os }}
          path: ./FittingApp-${{ github.ref_name }}-*.zip
          if-no-files-found: error

  publish_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ./artifacts/**/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
